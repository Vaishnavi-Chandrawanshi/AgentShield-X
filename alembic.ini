# A generic, single database configuration for Alembic

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, pathsep-separated, prefixing the behavior
# of the migration scripts.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to include in the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded in the python path
# search_path = false

# version locations - can be separated by classpaths
# version_locations = %(here)s/migrations/versions

# the propagation mode for versions
# version_propagation = false

[post_write_hooks]
# post_write_hooks defines scripts or methods that are run
# after a new migration revision file is created.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
